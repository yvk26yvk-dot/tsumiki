<style>
  :root{

    --rose:#E0907F; --rose-deep:#C26B58; --rose-soft:#FBEAE4;

  .kotei{display:inline-block;line-height:0;}

  header{padding:24px 0 4px;text-align:center;position:relative;}
  header .kotei{width:64px;height:64px;margin-bottom:6px;}
  header h1{font-size:20px;font-weight:700;margin:0;letter-spacing:.04em;}

  .speech .row{display:flex;gap:12px;align-items:flex-start;}
  .speech .kotei{width:40px;height:40px;flex:0 0 auto;}
  .speech .msg{flex:1;}
  .speech .name{font-size:11.5px;color:var(--rose-deep);font-weight:700;margin-bottom:3px;letter-spacing:.05em;}

  .view.active{display:block;animation:fade .35s ease;}

  .deck{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 20px 20px;margin-top:8px;min-height:340px;display:flex;flex-direction:column;}

  .progress i.cur{background:var(--rose-deep);}

  .slide .step{font-size:12px;color:var(--ink-faint);letter-spacing:.08em;margin-bottom:8px;}
  .slide .q{font-size:19px;font-weight:700;line-height:1.5;margin:0 0 4px;}

  .stat .l{font-size:11px;color:var(--ink-soft);margin-top:5px;}
  .strip{display:flex;gap:5px;margin:14px 0;}
  .strip .d{flex:1;text-align:center;}
  .strip .d .w{font-size:10.5px;color:var(--ink-faint);margin-bottom:5px;}
  .strip .d .o{height:30px;border-radius:9px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;}
  .strip .d .o.has{background:var(--leaf-soft);border-color:var(--leaf);}
  .section-label{font-size:12.5px;color:var(--ink-soft);font-weight:700;letter-spacing:.04em;margin:22px 0 10px;}
  .note-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:9px;}
  .note-card .meta{font-size:11px;color:var(--ink-faint);margin-bottom:4px;display:flex;justify-content:space-between;}
  .note-card .body{font-size:14px;line-height:1.6;}
  .empty{text-align:center;color:var(--ink-faint);font-size:14px;padding:30px 0;}
  .empty .kotei{width:56px;height:56px;margin:0 auto 10px;opacity:.7;}
  nav{position:fixed;left:0;right:0;bottom:0;background:rgba(251,244,239,0.93);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px 0 calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:6px;z-index:10;}

  nav button.on{color:var(--rose-deep);}
  nav button svg{width:22px;height:22px;}
  nav button span{font-size:10.5px;font-weight:700;}
  .rec-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:11px;}
  .rec-date{font-size:12px;color:var(--rose-deep);font-weight:700;letter-spacing:.04em;margin-bottom:8px;}
  .rec-item{font-size:13.5px;line-height:1.65;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .rec-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
  .rec-item b{font-weight:700;color:var(--leaf-deep);font-size:12px;}
  .rec-note{color:var(--ink-soft);font-size:13px;display:inline-block;margin-top:2px;}
  .rec-tag{font-size:11px;background:var(--rose-soft);color:var(--rose-deep);padding:2px 8px;border-radius:999px;}

  .promise-card{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--leaf-soft);border:1.5px solid var(--leaf);border-radius:var(--radius-sm);padding:13px 15px;font-size:15px;font-weight:600;color:var(--leaf-deep);}
  .promise-card button{background:none;border:none;font-family:inherit;font-size:12.5px;color:var(--ink-faint);cursor:pointer;text-decoration:underline;padding:2px;}
  body.noauth nav{display:none;}
  body.noauth .view:not(#view-auth){display:none!important;}
  .linklike{background:none;border:none;font-family:inherit;font-size:13px;color:var(--ink-faint);text-decoration:underline;cursor:pointer;padding:2px;}
  .toast{position:fixed;left:50%;bottom:90px;transform:translate(-50%,16px);background:var(--ink);color:#fff;font-size:13.5px;line-height:1.5;padding:11px 18px;border-radius:999px;opacity:0;transition:all .35s;z-index:20;max-width:88%;text-align:center;}
  .toast.show{opacity:.95;transform:translate(-50%,0);}
  .header-gear{position:absolute;top:28px;right:2px;background:none;border:none;cursor:pointer;color:var(--ink-faint);padding:6px;line-height:0;}
  .header-gear svg{width:21px;height:21px;}
  body.noauth .header-gear{display:none;}
  .settings-item{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:15px 16px;margin-bottom:10px;cursor:pointer;}
  .settings-item .lbl{font-weight:600;font-size:15px;}
  .settings-item .sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .settings-item .chev{color:var(--ink-faint);font-size:18px;}
  .linklike:disabled{opacity:.5;cursor:default;}
</style>
</head>

<script>

  _flushing:false,
  async flush(){
    if(this._flushing) return; this._flushing=true;
    try{
      const {data:{session}}=await sb.auth.getSession();
      if(!session) return;
      const uid=session.user.id, failed=new Set();
      /* 毎回キューを読み直す: 送信中に新しい保存が入っても取りこぼさない */
      while(true){
        const q=this._r(this.OKEY);

        if(!id) break;
        const sep=id.indexOf('|'), t=id.slice(0,sep), k=id.slice(sep+1);

        else if(t==='profile'){ ({error}=await sb.from('profiles').upsert({id:uid,promise:getPromise(),updated_at:new Date().toISOString()})); }
        if(error){ failed.add(id); continue; }  /* キューに残して次の機会に再送 */
        const cur=this._r(this.OKEY); delete cur[id]; this._w(this.OKEY,cur);
      }
    }catch(e){ /* オフライン等。キューに残っているので次のflushで再送される */ }
    finally{ this._flushing=false; }

};
const kotei = {
  daily(e){
    const filled = countYes(e);
    const head = ['おかえり。今日もよく来てくれたね。','おつかれさま。ちゃんと帰ってきたね。','今日のあなたに会えてうれしいよ。'][new Date().getDay()%3];

function key(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
const WD=['日','月','火','水','木','金','土'];

   render:s=>{

/* =====================================================================
   RECORD — 過去の自由記述をすべて日付つきで一覧する「きろく」ページ。
   日次のq2/q3/q4/q5/q6メモ + 週次の柱メモ・よかったこと を時系列でまとめる。
   ===================================================================== */
const Q3_LABELS=['感情を受け止められた','まだ難しかった','ネガティブはなかった'];
let recFilter='all';
function renderRecord(){
  const v=document.getElementById('view-record');
  const all=store._r(store.DKEY);
  const dates=Object.keys(all).sort().reverse();
  const weeks=store._r(store.WKEY);
  let html='<div class="speech"><div class="row"><span class="kotei" data-kotei></span><div class="msg"><div class="name">コウテイちゃん</div>あなたが歩いてきた道だよ。ゆっくり、ながめてね。</div></div></div>';

  if(dates.length===0 && Object.keys(weeks).length===0){
    html+='<div class="empty"><span class="kotei" data-kotei="care"></span>まだ記録がないよ。<br>きょうのタブから、はじめてみよう。</div>';
    v.innerHTML=html; mountFaces(); return;
  }

  /* フィルタチップ */
  const FILTERS=[['all','すべて'],['promise','約束'],['jinkaku','人格'],['kimochi','気持ち'],['dekita','できたこと'],['kouken','貢献'],['hitori','ひとり時間'],['weekly','週次']];
  html+='<div class="tags" style="margin:4px 0 14px;">'+FILTERS.map(f=>'<button data-rf="'+f[0]+'" class="'+(recFilter===f[0]?'on':'')+'">'+f[1]+'</button>').join('')+'</div>';

  /* 日次：月ごとにグループ */
  if(recFilter!=='weekly'){
    let curMonth='';
    let dailyHtml='';
    dates.forEach(dk=>{
      const e=all[dk];
      const d=new Date(dk+'T00:00:00');
      let items=[];
      if((recFilter==='all'||recFilter==='promise') && e.q1_promise&&e.q1_promise.trim()) items.push('<div class="rec-item"><b>自分との約束</b> '+esc(e.q1_promise)+(e.q1_done?' <span class="rec-tag ok">守れた</span>':'')+'</div>');
      if((recFilter==='all'||recFilter==='jinkaku') && (e.q2_tags||[]).length) items.push('<div class="rec-item"><b>磨けた人格</b> '+e.q2_tags.map(esc).join('・')+(e.q2_note?'<br><span class="rec-note">'+esc(e.q2_note)+'</span>':'')+'</div>');
      if((recFilter==='all'||recFilter==='kimochi') && e.q3_note&&e.q3_note.trim()) items.push('<div class="rec-item"><b>気持ち</b> '+(e.q3_pick!=null?'<span class="rec-tag">'+Q3_LABELS[e.q3_pick]+'</span> ':'')+'<br><span class="rec-note">'+esc(e.q3_note)+'</span></div>');
      if((recFilter==='all'||recFilter==='dekita') && e.q4_note&&e.q4_note.trim()) items.push('<div class="rec-item"><b>できたこと</b><br><span class="rec-note">'+esc(e.q4_note)+'</span></div>');
      if((recFilter==='all'||recFilter==='kouken') && e.q5_note&&e.q5_note.trim()) items.push('<div class="rec-item"><b>人への貢献</b><br><span class="rec-note">'+esc(e.q5_note)+'</span></div>');
      if((recFilter==='all'||recFilter==='hitori') && e.q6_note&&e.q6_note.trim()) items.push('<div class="rec-item"><b>ひとり時間</b><br><span class="rec-note">'+esc(e.q6_note)+'</span></div>');
      if(items.length===0) return;
      const mLabel=d.getFullYear()+'年'+(d.getMonth()+1)+'月';
      if(mLabel!==curMonth){curMonth=mLabel;dailyHtml+='<div class="rec-month">'+mLabel+'</div>';}
      dailyHtml+='<div class="rec-card"><div class="rec-date">'+fmtDate(d)+'</div>'+items.join('')+'</div>';
    });
    if(dailyHtml){html+='<div class="section-label">日々のきろく</div>'+dailyHtml;}
  }

  /* 週次 */
  if(recFilter==='all'||recFilter==='weekly'){
    const wkeys=Object.keys(weeks).sort().reverse();
    let weekHtml='';
    wkeys.forEach(wk=>{
      const w=weeks[wk];
      const label=wk.replace('W','')+' の週';
      let parts=[];
      const pmemos=w.pmemos||{};
      const pmemoKeys=Object.keys(pmemos);
      if(pmemoKeys.length) parts.push('<div class="rec-item"><b>柱のメモ</b><br>'+pmemoKeys.map(k=>'<span class="rec-note">'+esc(k)+'：'+esc(pmemos[k])+'</span>').join('<br>')+'</div>');
      const goods=(w.goods||[]).filter(g=>g&&g.trim());
      if(goods.length) parts.push('<div class="rec-item"><b>よかったこと '+goods.length+'個</b><br><span class="rec-note">'+goods.map(esc).join('<br>')+'</span></div>');
      if(parts.length===0) return;
      weekHtml+='<div class="rec-card"><div class="rec-date">'+label+'</div>'+parts.join('')+'</div>';
    });
    if(weekHtml){html+='<div class="section-label">週次のきろく</div>'+weekHtml;}
  }

  v.innerHTML=html; mountFaces();
  document.querySelectorAll('[data-rf]').forEach(b=>{b.onclick=()=>{recFilter=b.dataset.rf;renderRecord();};});
}

function switchView(view){
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===view));
  if(view==='daily'){dstate={};didx=0;renderDaily();}
  if(view==='weekly'){wstate={};renderWeekly();}
  if(view==='record'){renderRecord();}
  if(view==='settings'){delMode=false;renderSettings();}
  window.scrollTo(0,0);
}

  v.innerHTML='<div class="speech"><div class="row"><span class="kotei" data-kotei></span><div class="msg"><div class="name">コウテイちゃん</div>設定だよ。ゆっくりどうぞ。</div></div></div>'
    +'<div style="margin-top:10px">'
    +SETTINGS_ITEMS.map(it=>'<div class="settings-item" data-set="'+it.id+'"><div><div class="lbl">'+it.label+'</div>'+(it.sub?'<div class="sub">'+it.sub+'</div>':'')+'</div><span class="chev">›</span></div>').join('')
    +'</div>'
    +'<div class="deck-nav" style="margin-top:18px"><button class="btn ghost" id="settings-back" style="flex:1">もどる</button></div>'
    +'<p style="text-align:center;margin:28px 0 0"><button class="linklike" id="open-delete">アカウントの削除について</button></p>';
  mountFaces();
  document.getElementById('settings-back').onclick=()=>switchView('daily');
  document.querySelectorAll('[data-set]').forEach(el=>{el.onclick=()=>{const it=SETTINGS_ITEMS.find(x=>x.id===el.dataset.set);if(it)it.fn();};});
  document.getElementById('open-delete').onclick=()=>{delMode=true;renderSettings();};
}
async function doLogout(){
  const pending=Object.keys(store._r(store.OKEY)).length;
  if(pending>0 && !confirm('まだクラウドに送れていない記録が'+pending+'件あるよ。ログアウトすると、この端末からは消えちゃう。それでもログアウトする?')) return;
  if(pending===0 && !confirm('ログアウトする? 記録はクラウドにちゃんと残ってるから、安心してね。')) return;
  await sb.auth.signOut({scope:'local'});
  KOTEI_KEYS.forEach(k=>localStorage.removeItem(k));
  location.reload();
}
function renderDeleteConfirm(err){
  const v=document.getElementById('view-settings');
  v.innerHTML='<div class="speech"><div class="row"><span class="kotei" data-kotei="care"></span><div class="msg"><div class="name">コウテイちゃん</div>アカウントを消すと、いままでの記録はぜんぶ消えて、元に戻せないよ。それでもいいか、ゆっくり考えてね。</div></div></div>'
    +(err?'<p style="color:var(--rose-deep);font-size:13.5px;text-align:center;margin:12px 0 0">'+esc(err)+'</p>':'')
    +'<div class="deck-nav" style="margin-top:18px"><button class="btn primary" id="del-cancel" style="flex:2">やめておく</button><button class="btn ghost" id="del-go" style="flex:1">削除にすすむ</button></div>';
  mountFaces();
  document.getElementById('del-cancel').onclick=()=>{delMode=false;renderSettings();};
  document.getElementById('del-go').onclick=doDeleteAccount;
}
async function doDeleteAccount(){
  if(!confirm('ほんとうに削除する? 記録はすべて消えて、元に戻せないよ。')) return;
  const btn=document.getElementById('del-go');btn.disabled=true;
  const {error}=await sb.rpc('delete_user');
  if(error){renderDeleteConfirm('いまは削除できないみたい。電波のあるところで、もう一度ためしてみてね。');return;}
  await sb.auth.signOut({scope:'local'}).catch(()=>{});
  KOTEI_KEYS.forEach(k=>localStorage.removeItem(k));
  toast('ここまで一緒に歩いてくれてありがとう。またいつでも、待ってるね');
  setTimeout(()=>location.reload(),2500);
}

/* ===== 認証 ===== */
let authMode='login';
function renderAuth(notice){
  document.body.classList.add('noauth');
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  const v=document.getElementById('view-auth');
  v.classList.add('active');
  const isUp=authMode==='signup';
  v.innerHTML='<div class="speech"><div class="row"><span class="kotei" data-kotei></span><div class="msg"><div class="name">コウテイちゃん</div>'
    +(isUp?'はじめまして。あなたの記録、わたしが大事に預かるね。':'おかえり。あなたの記録、ここで待ってるよ。')
    +'</div></div></div>'
    +'<div class="deck" style="min-height:auto"><div class="slide">'
    +(notice?'<p class="sub" style="color:var(--rose-deep);margin:0 0 14px">'+esc(notice)+'</p>':'')
    +'<div class="field-label">メールアドレス</div><input type="email" id="auth-email" autocomplete="email">'
    +'<div class="field-label" style="margin-top:12px">パスワード</div><input type="password" id="auth-pw" autocomplete="'+(isUp?'new-password':'current-password')+'">'
    +'</div><div class="deck-nav"><button class="btn primary" id="auth-go">'+(isUp?'はじめる':'ログイン')+'</button></div>'
    +'<p style="text-align:center;margin:14px 0 0"><button class="linklike" id="auth-toggle">'+(isUp?'アカウントがある人はこちら':'はじめての人はこちら')+'</button></p></div>';
  mountFaces();
  document.getElementById('auth-toggle').onclick=()=>{authMode=isUp?'login':'signup';renderAuth();};
  document.getElementById('auth-go').onclick=doAuth;
  const authEnter=e=>{if(e.key==='Enter'&&!document.getElementById('auth-go').disabled)doAuth();};
  document.getElementById('auth-email').onkeydown=authEnter;
  document.getElementById('auth-pw').onkeydown=authEnter;
}
function authErrMsg(err){
  const m=(err&&err.message)||'';
  if(m.includes('Invalid login credentials'))return 'メールかパスワードが違うみたい。もう一度みてくれる?';
  if(m.includes('already registered'))return 'そのメールはもう登録されてるよ。ログインしてみてね。';
  if(m.includes('at least 6'))return 'パスワードは6文字以上にしてね。';
  if(m.includes('invalid format')||m.includes('valid email'))return 'メールアドレスの形が違うみたい。';
  return 'うまくいかなかったみたい。すこし待ってもう一度ためしてみてね。('+m+')';
}
async function doAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-pw').value;
  if(!email||!pw){renderAuth('メールとパスワード、両方入れてね。');document.getElementById('auth-email').value=email;return;}
  const mode=authMode;
  const btn=document.getElementById('auth-go');btn.disabled=true;btn.textContent='ちょっと待ってね…';
  const tg=document.getElementById('auth-toggle');if(tg)tg.disabled=true;
  const res=mode==='signup'
    ?await sb.auth.signUp({email,password:pw})
    :await sb.auth.signInWithPassword({email,password:pw});
  if(res.error){renderAuth(authErrMsg(res.error));document.getElementById('auth-email').value=email;return;}
  if(mode==='signup'&&!res.data.session){
    authMode='login';
    renderAuth('確認メールを送ったよ。メールの中のリンクを押してから、ここでログインしてね。');
    document.getElementById('auth-email').value=email;
    return;
  }
  enterApp();
}
function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),400);},4500);
}
function canonJson(v){
  if(Array.isArray(v))return '['+v.map(canonJson).join(',')+']';
  if(v&&typeof v==='object')return '{'+Object.keys(v).sort().map(k=>JSON.stringify(k)+':'+canonJson(v[k])).join(',')+'}';
  return JSON.stringify(v);
}
/* 起動時同期: クラウド→ローカルにプル。未送信キーはローカル優先。
   ローカルだけにあるキーはキューへ(初回移行もオフライン復帰もこの1規則) */
async function bootSync(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session) return false;
  const uid=session.user.id;
  let changed=false, toMigrate=0;
  try{
    const [dRes,wRes,pRes]=await Promise.all([
      sb.from('daily').select('date_key,entry'),
      sb.from('weekly').select('week_key,entry'),
      sb.from('profiles').select('promise').eq('id',uid).maybeSingle()
    ]);
    const q=store._r(store.OKEY);
    const merge=(res,storageKey,keyCol,type)=>{
      if(res.error) return;
      const local=store._r(storageKey), cloud={};
      (res.data||[]).forEach(r=>{cloud[r[keyCol]]=r.entry;});
      Object.keys(cloud).forEach(k=>{
        if(!q[type+'|'+k] && canonJson(local[k])!==canonJson(cloud[k])){local[k]=cloud[k];changed=true;}
      });
      Object.keys(local).forEach(k=>{
        if(!cloud[k] && !q[type+'|'+k]){store._enq(type,k);toMigrate++;}
      });
      store._w(storageKey,local);
    };
    merge(dRes,store.DKEY,'date_key','daily');
    merge(wRes,store.WKEY,'week_key','weekly');
    if(!pRes.error && !q['profile|promise']){
      const cp=(pRes.data&&pRes.data.promise)||'';
      if(cp && cp!==getPromise()){setPromiseLocal(cp);changed=true;}
      else if(!cp && getPromise()){store._enq('profile','promise');toMigrate++;}
    }
    if(toMigrate>0) localStorage.setItem('kotei.migrating.v1','1');
    await store.flush();
    /* 移行の完送を見届けてから一度だけ報告(部分失敗した回はフラグが残り、次回完送時に出る) */
    if(localStorage.getItem('kotei.migrating.v1') && !localStorage.getItem('kotei.migrated.v1') && Object.keys(store._r(store.OKEY)).length===0){
      localStorage.setItem('kotei.migrated.v1','1');
      localStorage.removeItem('kotei.migrating.v1');
      toast('これまでの記録、クラウドでちゃんと預かったよ');
    }
  }catch(e){ /* オフライン起動: ローカルキャッシュのまま使える */ }
  return changed;
}
async function enterApp(){
  document.body.classList.remove('noauth');
  switchView('daily');            /* まずローカルキャッシュで即表示 */
  const changed=await bootSync(); /* 裏でプル */
  const cur=document.querySelector('.view.active');
  /* プルで変わったときだけ再描画。入力途中(スライド操作中)は邪魔しない */
  if(changed && cur && cur.id==='view-daily' && Object.keys(dstate).length===0) renderDaily();
}

mountFaces();
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session){enterApp();}else{renderAuth();}
})();
window.addEventListener('online',()=>store.flush());
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
